name: UWDiploma128 Local Gate

on:
  pull_request:
    paths:
      - "contracts/UWDiploma128.sol"
      - "test/UWDiploma128.t.sol"
      - "foundry.toml"
      - ".github/workflows/uwdiploma128-local-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Foundry v1.7.1
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
          cache: false

      - name: Show Forge version
        run: forge --version

      - name: Install pinned Solidity dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib

          git clone https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          git -C lib/openzeppelin-contracts checkout 5fd1781b1454fd1ef8e722282f86f9293cacf256

          git clone https://github.com/foundry-rs/forge-std.git lib/forge-std
          git -C lib/forge-std checkout bf647bd6046f2f7da30d0c2bf435e5c76a780c1b

      - name: Build contract
        shell: bash
        run: |
          set -euo pipefail
          forge clean
          forge build --force

      - name: Run 12-case test matrix
        shell: bash
        run: |
          set -euo pipefail
          forge test -vvv

      - name: Export CI artifact hashes
        id: artifact_hashes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          artifact = Path("out/UWDiploma128.sol/UWDiploma128.json")
          data = json.loads(artifact.read_text())

          abi_json = json.dumps(data["abi"], separators=(",", ":"), ensure_ascii=False)
          creation_hex = data["bytecode"]["object"]
          runtime_hex = data["deployedBytecode"]["object"]

          if creation_hex.startswith("0x"):
              creation_hex = creation_hex[2:]
          if runtime_hex.startswith("0x"):
              runtime_hex = runtime_hex[2:]
          if not creation_hex:
              raise SystemExit("creation bytecode is empty")
          if not runtime_hex:
              raise SystemExit("runtime bytecode is empty")

          creation = bytes.fromhex(creation_hex)
          runtime = bytes.fromhex(runtime_hex)
          full_artifact = artifact.read_bytes()

          report = {
              "artifact_path": str(artifact),
              "full_artifact_json_sha256": hashlib.sha256(full_artifact).hexdigest(),
              "abi_sha256": hashlib.sha256(abi_json.encode()).hexdigest(),
              "creation_bytecode_sha256": hashlib.sha256(creation).hexdigest(),
              "creation_bytecode_bytes": len(creation),
              "runtime_bytecode_sha256": hashlib.sha256(runtime).hexdigest(),
              "runtime_bytecode_bytes": len(runtime),
              "solc_version": data.get("metadata", "UNPARSED"),
          }

          Path("ci-artifacts/uwdiploma128_hash_report.json").write_text(
              json.dumps(report, indent=2) + "\n"
          )
          print(json.dumps(report, indent=2))
          PY

          cp out/UWDiploma128.sol/UWDiploma128.json \
            ci-artifacts/UWDiploma128.json

      - name: Upload CI artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uwdiploma128-ci-artifacts-${{ github.run_id }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Verify expected ABI and creation-bytecode hashes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("ci-artifacts/uwdiploma128_hash_report.json").read_text()
          )

          expected_abi = "ce6ae9bf7bc81ed2bd55fdf16a2184810efe350bf5a1e6c53c13911c431ffe8f"
          expected_creation = "16b4ee600f7ac7cb5e7d6c4f17cba8bf744ce1d4acf142d016eef284280496e1"
          expected_creation_bytes = 8060

          print("CI_ABI_SHA256=" + report["abi_sha256"])
          print("CI_CREATION_BYTECODE_SHA256=" + report["creation_bytecode_sha256"])
          print("CI_CREATION_BYTECODE_BYTES=" + str(report["creation_bytecode_bytes"]))
          print("CI_RUNTIME_BYTECODE_SHA256=" + report["runtime_bytecode_sha256"])
          print("CI_RUNTIME_BYTECODE_BYTES=" + str(report["runtime_bytecode_bytes"]))
          print("CI_FULL_ARTIFACT_JSON_SHA256=" + report["full_artifact_json_sha256"])

          failures = []
          if report["abi_sha256"] != expected_abi:
              failures.append("ABI hash mismatch")
          if report["creation_bytecode_sha256"] != expected_creation:
              failures.append("creation bytecode hash mismatch")
          if report["creation_bytecode_bytes"] != expected_creation_bytes:
              failures.append("creation bytecode length mismatch")

          if failures:
              raise SystemExit("; ".join(failures))
          PY

      - name: Emit governed summary
        if: always()
        shell: bash
        run: |
          {
            echo "## UWDiploma128 Local Gate"
            echo
            echo "- Authority: false"
            echo "- Broadcast: not performed"
            echo "- Deployment: not claimed"
            echo "- CI artifact bundle: uploaded when generated"
            echo "- Role grants: not performed"
          } >> "$GITHUB_STEP_SUMMARY"
