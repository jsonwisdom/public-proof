name: Firebase Production

on:
  workflow_dispatch:
    inputs:
      approved_preview_sha256:
        description: Verified SHA-256 of public/index.html from preview
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy-production:
    if: vars.FIREBASE_DEPLOYMENT_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: firebase-production
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify preview hash
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-parse HEAD)"
          ACTUAL_SHA="$(sha256sum public/index.html | cut -d ' ' -f 1)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "actual_sha=$ACTUAL_SHA" >> "$GITHUB_OUTPUT"
          test "$ACTUAL_SHA" = "${{ inputs.approved_preview_sha256 }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PRODUCTION_PROVIDER }}
          service_account: ${{ vars.GCP_FIREBASE_PRODUCTION_DEPLOYER }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy live
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          firebase deploy \
            --only hosting:production \
            --project jaywisdom-boardroom \
            --non-interactive 2>&1 | tee deploy_output.txt

          URL="$(grep -Eo 'https://[^[:space:]]+\.web\.app' deploy_output.txt | head -n 1 || true)"
          if [ -z "$URL" ]; then URL="UNOBSERVED"; fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Generate production receipt
        shell: bash
        run: |
          set -euo pipefail
          cat > production-receipt.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "commit_sha": "${{ steps.gate.outputs.commit_sha }}",
            "workflow_run_id": "${{ github.run_id }}",
            "project_id": "jaywisdom-boardroom",
            "site_id": "jaywisdom-boardroom",
            "deployment_channel": "live",
            "deployment_url": "${{ steps.deploy.outputs.deploy_url }}",
            "deployment_timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "actual_index_sha256": "${{ steps.gate.outputs.actual_sha }}",
            "approved_preview_sha256": "${{ inputs.approved_preview_sha256 }}",
            "auth_mode": "WORKLOAD_IDENTITY_FEDERATION",
            "authority": false
          }
          EOF

      - name: Upload production receipt
        uses: actions/upload-artifact@v4
        with:
          name: production-receipt-${{ github.run_id }}
          path: production-receipt.json
