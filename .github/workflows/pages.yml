name: Deploy Public Proof Portal to Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - ".nojekyll"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static portal artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll
          sha256sum _site/index.html | tee _site/index.sha256

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
