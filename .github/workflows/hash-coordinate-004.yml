name: Hash Coordinate 004 PDF

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/hash-coordinate-004.yml'

permissions:
  contents: write

jobs:
  hash-coordinate-004:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p coordinates/004/source coordinates/004/v1

      - name: Download MMB February 2026 Debt Capacity PDF
        run: |
          curl -L "https://mn.gov/mmb-stat/debt-management/bonding/debt-capacity-reports/2026/DCF%20February%202026%20Final.pdf" -o coordinates/004/source/mn_feb_2026_debt_capacity.pdf

      - name: Compute SHA256
        run: |
          sha256sum coordinates/004/source/mn_feb_2026_debt_capacity.pdf | tee coordinates/004/v1/hash.txt

      - name: Commit hash artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coordinates/004/source/mn_feb_2026_debt_capacity.pdf coordinates/004/v1/hash.txt
          git diff --cached --quiet && exit 0
          git commit -m "ci: hash Coordinate_004 source PDF"
          git push
