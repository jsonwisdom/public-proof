name: Hash Coordinate 005 PDF

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/hash-coordinate-005.yml'

permissions:
  contents: write

jobs:
  hash-coordinate-005:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p coordinates/005/source coordinates/005/v1

      - name: Download MMB April 2026 Revenue Update PDF
        run: |
          curl -L "https://mn.gov/mmb-stat/000/az/forecast/2026/revenue-economic-update/april.pdf" -o coordinates/005/source/mn_april_2026_update.pdf

      - name: Compute SHA256
        run: |
          sha256sum coordinates/005/source/mn_april_2026_update.pdf | tee coordinates/005/v1/hash.txt

      - name: Commit hash artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coordinates/005/source/mn_april_2026_update.pdf coordinates/005/v1/hash.txt
          git diff --cached --quiet && exit 0
          git commit -m "ci: hash Coordinate_005 source PDF"
          git push
