name: Firebase Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: >-
      vars.FIREBASE_DEPLOYMENT_ENABLED == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate preview configuration
        shell: bash
        env:
          WIF_PROVIDER: ${{ vars.GCP_WIF_PREVIEW_PROVIDER }}
          PREVIEW_DEPLOYER: ${{ vars.GCP_FIREBASE_PREVIEW_DEPLOYER }}
        run: |
          set -euo pipefail
          test -n "$WIF_PROVIDER" || { echo "ABORT: GCP_WIF_PREVIEW_PROVIDER is unset"; exit 1; }
          test -n "$PREVIEW_DEPLOYER" || { echo "ABORT: GCP_FIREBASE_PREVIEW_DEPLOYER is unset"; exit 1; }
          case "$WIF_PROVIDER" in
            projects/*/locations/global/workloadIdentityPools/*/providers/*) ;;
            *) echo "ABORT: invalid WIF provider resource name"; exit 1 ;;
          esac
          case "$PREVIEW_DEPLOYER" in
            *@jaywisdom-boardroom-preview.iam.gserviceaccount.com) ;;
            *) echo "ABORT: preview deployer must belong to jaywisdom-boardroom-preview"; exit 1 ;;
          esac

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PREVIEW_PROVIDER }}
          service_account: ${{ vars.GCP_FIREBASE_PREVIEW_DEPLOYER }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Verify target configuration
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"jaywisdom-boardroom-preview"' .firebaserc
          grep -q '"preview"' .firebaserc
          firebase projects:list --json >/tmp/firebase-projects.json

      - name: Hash and deploy preview
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          INDEX_HASH="$(sha256sum public/index.html | cut -d ' ' -f 1)"
          echo "index_sha256=$INDEX_HASH" >> "$GITHUB_OUTPUT"

          firebase hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" \
            --only hosting:preview \
            --project jaywisdom-boardroom-preview \
            --expires 7d \
            --non-interactive 2>&1 | tee deploy_output.txt

          URL="$(grep -Eo 'https://[^[:space:]]+\.web\.app' deploy_output.txt | head -n 1 || true)"
          if [ -z "$URL" ]; then URL="UNOBSERVED"; fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Generate preview receipt
        shell: bash
        run: |
          set -euo pipefail
          cat > preview-receipt.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "commit_sha": "$(git rev-parse HEAD)",
            "workflow_run_id": "${{ github.run_id }}",
            "project_id": "jaywisdom-boardroom-preview",
            "site_id": "jaywisdom-boardroom-preview",
            "deployment_channel": "pr-${{ github.event.pull_request.number }}",
            "deployment_url": "${{ steps.deploy.outputs.deploy_url }}",
            "deployment_timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "index_sha256": "${{ steps.deploy.outputs.index_sha256 }}",
            "approved_preview_sha256": null,
            "auth_mode": "WORKLOAD_IDENTITY_FEDERATION",
            "authority": false
          }
          EOF

      - name: Upload preview receipt
        uses: actions/upload-artifact@v4
        with:
          name: preview-receipt-${{ github.run_id }}
          path: preview-receipt.json
